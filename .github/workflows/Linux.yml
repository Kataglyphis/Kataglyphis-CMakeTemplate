name: Build + test + run on Linux in container - x86-64/arm64

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  BUILD_TYPE: Debug
  BUILD_DIR: build
  BUILD_RELEASE_DIR: build-release
  GCC_DEBUG_PRESET: linux-debug-GNU
  CLANG_DEBUG_PRESET: linux-debug-clang
  GCC_PROFILE_PRESET: linux-profile-GNU
  CLANG_PROFILE_PRESET: linux-profile-clang
  CLANG_RELEASE_PRESET: linux-release-clang
  COVERAGE_JSON: coverage.json
  DOCS_OUT: build/build/html
  CONTAINER_IMAGE: ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest
  CLANG_GCC_TOOLCHAIN: /opt/gcc-15.2.0

jobs:
  prepare-matrix:
    runs-on: ubuntu-24.04
    outputs:
      build_matrix: ${{ steps.set-matrix.outputs.build_matrix }}
    steps:
      - name: Build matrix (arm gated by commit message)
        id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.event.head_commit.message }}" == *"[build-arm]"* ]]; then
            echo 'build_matrix={"include":[{"runs_on":"ubuntu-24.04","arch":"x64","platform":"linux/amd64","compiler":"gcc"},{"runs_on":"ubuntu-24.04","arch":"x64","platform":"linux/amd64","compiler":"clang"},{"runs_on":"ubuntu-24.04-arm","arch":"arm64","platform":"linux/arm64","compiler":"gcc"},{"runs_on":"ubuntu-24.04-arm","arch":"arm64","platform":"linux/arm64","compiler":"clang"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'build_matrix={"include":[{"runs_on":"ubuntu-24.04","arch":"x64","platform":"linux/amd64","compiler":"gcc"},{"runs_on":"ubuntu-24.04","arch":"x64","platform":"linux/amd64","compiler":"clang"}]}' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare-matrix
    strategy:
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.build_matrix) }}
    runs-on: ${{ matrix.runs_on }}

    steps:
      - name: Free Disk Space on Host
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Prepare isolated workspace mount
        run: |
          ISOLATED_WS="${{ github.workspace }}-${{ matrix.arch }}-${{ matrix.compiler }}"
          rm -rf "${ISOLATED_WS}"
          mkdir -p "${ISOLATED_WS}"
          cp -a "${{ github.workspace }}/." "${ISOLATED_WS}/"
          echo "ISOLATED_WS=${ISOLATED_WS}" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_PAT || github.token }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull container image
        run: |
          for i in 1 2 3; do
            echo "Attempt $i to pull container..."
            if timeout 900 docker pull "${{ env.CONTAINER_IMAGE }}"; then
              echo "Successfully pulled container"
              exit 0
            fi
            echo "Pull failed, waiting before retry..."
            sleep 30
          done
          echo "Failed to pull container after 3 attempts"
          exit 1

      - name: Build + test + coverage + analyzers (in container)
        run: |
          docker run --rm --privileged \
            --platform ${{ matrix.platform }} \
            -e CLANG_GCC_TOOLCHAIN="${{ env.CLANG_GCC_TOOLCHAIN }}" \
            -v "${{ env.ISOLATED_WS }}:/workspace" \
            -w /workspace \
            "${{ env.CONTAINER_IMAGE }}" \
            bash /workspace/scripts/linux/build_test_coverage_analyzers.sh \
            --compiler "${{ matrix.compiler }}" \
            --build-dir "${{ env.BUILD_DIR }}" \
            --gcc-debug-preset "${{ env.GCC_DEBUG_PRESET }}" \
            --clang-debug-preset "${{ env.CLANG_DEBUG_PRESET }}" \
            --coverage-json "${{ env.COVERAGE_JSON }}"

      - name: Profiling + perf/bench (in container)
        continue-on-error: true
        run: |
          docker run --rm --privileged \
            --platform ${{ matrix.platform }} \
            -e CLANG_GCC_TOOLCHAIN="${{ env.CLANG_GCC_TOOLCHAIN }}" \
            -v "${{ env.ISOLATED_WS }}:/workspace" \
            -w /workspace \
            "${{ env.CONTAINER_IMAGE }}" \
            bash /workspace/scripts/linux/profiling_perf_bench.sh \
            --compiler "${{ matrix.compiler }}" \
            --build-dir "${{ env.BUILD_DIR }}" \
            --gcc-profile-preset "${{ env.GCC_PROFILE_PRESET }}" \
            --clang-profile-preset "${{ env.CLANG_PROFILE_PRESET }}"

      - name: Build docs + convert results (in container)
        if: ${{ matrix.compiler == 'clang' && matrix.runs_on == 'ubuntu-24.04' }}
        run: |
          docker run --rm --privileged \
            --platform ${{ matrix.platform }} \
            -e CLANG_GCC_TOOLCHAIN="${{ env.CLANG_GCC_TOOLCHAIN }}" \
            -v "${{ env.ISOLATED_WS }}:/workspace" \
            -w /workspace \
            "${{ env.CONTAINER_IMAGE }}" \
            bash /workspace/scripts/linux/build_docs_convert_results.sh \
            --docs-out "${{ env.DOCS_OUT }}"

      - name: Fix permissions for docs directory
        if: ${{ matrix.compiler == 'clang' && matrix.runs_on == 'ubuntu-24.04' }}
        run: |
          chmod -R 755 "${{ env.ISOLATED_WS }}/docs"
          ls -la "${{ env.ISOLATED_WS }}/docs"

      - name: Sync files to domain
        if: ${{ matrix.compiler == 'clang' && matrix.runs_on == 'ubuntu-24.04' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PW }}
          local-dir: "${{ env.ISOLATED_WS }}/docs/build/html/"

      - name: Release build + package + callgrind (in container)
        if: ${{ matrix.compiler == 'clang' }}
        run: |
          docker run --rm --privileged \
            --platform ${{ matrix.platform }} \
            -e CLANG_GCC_TOOLCHAIN="${{ env.CLANG_GCC_TOOLCHAIN }}" \
            -v "${{ env.ISOLATED_WS }}:/workspace" \
            -w /workspace \
            "${{ env.CONTAINER_IMAGE }}" \
            bash /workspace/scripts/linux/release_package_callgrind.sh \
            --build-release-dir "${{ env.BUILD_RELEASE_DIR }}" \
            --clang-release-preset "${{ env.CLANG_RELEASE_PRESET }}"

      - name: Upload Linux Packages (Clang only)
        if: ${{ matrix.compiler == 'clang' }}
        uses: actions/upload-artifact@v7.0.0
        with:
          name: linux-packages-${{ matrix.arch }}
          path: |
            ${{ env.ISOLATED_WS }}/${{ env.BUILD_RELEASE_DIR }}/*.tar.gz
            ${{ env.ISOLATED_WS }}/${{ env.BUILD_RELEASE_DIR }}/*.tgz
            ${{ env.ISOLATED_WS }}/${{ env.BUILD_RELEASE_DIR }}/*.deb
            ${{ env.ISOLATED_WS }}/${{ env.BUILD_RELEASE_DIR }}/*.AppImage
            ${{ env.ISOLATED_WS }}/${{ env.BUILD_RELEASE_DIR }}/*.flatpak
